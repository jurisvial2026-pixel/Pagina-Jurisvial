<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juris Vial | Especialistas en Tránsito Ecuador</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; color: #333; }
        header { background: #002366; color: white; padding: 20px; text-align: center; }
        .hero { padding: 50px; background: #f4f4f4; text-align: center; }
        .contact-form { max-width: 500px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { background: #D4AF37; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Juris Vial</h1>
    <p>Expertos en derecho de tránsito en Ecuador</p>
</header>

<section class="hero">
    <h2>¿Tienes una multa injusta o un accidente?</h2>
    <p>Estamos aquí para defender tus derechos en las vías.</p>
</section>

<section class="contact-form">
    <h3>Contáctanos directamente</h3>
    <form action="mailto:tuemail@ejemplo.com" method="post" enctype="text/plain">
        <label>Tu correo electrónico:</label>
        <input type="email" name="email" required placeholder="ejemplo@correo.com">
        <label>Asunto:</label>
        <input type="text" name="asunto" placeholder="¿Cómo podemos ayudarte?">
        <button type="submit">Enviar solicitud de asesoría</button>
    </form>
</section>

</body>
</html>
